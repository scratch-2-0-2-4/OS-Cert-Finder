<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Certificats</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Certificats</h1>
            <ul class="nav-links">
                <li><a href="index.html">Recherche</a></li>
                <li><a href="certificates.html" class="active">Mes Certificats</a></li>
                <li><a href="admin.html">Administration</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="certificates-section">
            <h2>Mes Certificats</h2>
            
            <div class="filters">
                <input 
                    type="text" 
                    id="filterInput" 
                    placeholder="Filtrer mes certificats..."
                    class="input"
                >
            </div>

            <div id="certificatesList" class="certificates-list">
                <p class="empty-state">Aucun certificat trouvé.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Gestionnaire de Certificats. Tous droits réservés.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadUserCertificates();
        });

        function loadUserCertificates() {
            const certificates = JSON.parse(localStorage.getItem('userCertificates') || '[]');
            const container = document.getElementById('certificatesList');
            
            if (certificates.length === 0) {
                container.innerHTML = '<p class="empty-state">Aucun certificat sauvegardé. Consultez la page de recherche.</p>';
                return;
            }

            container.innerHTML = certificates.map(cert => `
                <div class="certificate-card">
                    <h3>${cert.nom || 'Sans titre'}</h3>
                    <p><strong>Numéro :</strong> ${cert.numero}</p>
                    <p><strong>Date d'émission :</strong> ${cert.dateEmission || 'Non spécifiée'}</p>
                    <p><strong>Valide jusqu'au :</strong> ${cert.dateExpiration || 'Non spécifiée'}</p>
                    <button class="btn btn-danger" onclick="removeCertificate('${cert.numero}')">Supprimer</button>
                </div>
            `).join('');
        }

        function removeCertificate(numero) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce certificat ?')) {
                let certificates = JSON.parse(localStorage.getItem('userCertificates') || '[]');
                certificates = certificates.filter(c => c.numero !== numero);
                localStorage.setItem('userCertificates', JSON.stringify(certificates));
                loadUserCertificates();
            }
        }

        document.getElementById('filterInput').addEventListener('input', function(e) {
            const filter = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.certificate-card');
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(filter) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
